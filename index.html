<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso do Estudante</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      width: 100%;
      max-width: 460px;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
      text-align: center;
      box-sizing: border-box;
    }

    .logo {
      width: 120px;
      max-width: 45%;
      margin-bottom: 14px;
    }

    h2 {
      font-size: 18px;
      color: #0D47A1;
      margin: 0 0 6px;
    }

    h1 {
      font-size: 24px;
      color: #1565C0;
      margin: 0 0 12px;
    }

    p {
      color: #555;
      font-size: 15px;
      line-height: 1.4;
    }

    input {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: 1px solid #ccc;
      border-radius: 9px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      background: #1565C0;
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0D47A1;
    }

    #resultado {
      margin-top: 20px;
      font-size: 15px;
    }

    .erro {
      color: #B00020;
      font-weight: bold;
    }

    .sucesso a {
      display: inline-block;
      background: #1565C0;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 9px;
      margin-top: 10px;
    }

    .rodape {
      margin-top: 26px;
      font-size: 12px;
      color: #777;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }
    
      .container {
        margin-top: 24px;
        padding: 24px 20px;
        border-radius: 16px;
      }
    
      .logo {
        width: 95px;
      }
    
      h2 {
        font-size: 16px;
      }
    
      h1 {
        font-size: 21px;
      }
    
      p {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="assets/logo.png" alt="Logo da escola" class="logo">

    <h2>EEEB Professor Gentil Viegas Cardoso</h2>

    <h1>Sistema de Acesso do Estudante</h1>

    <p>Digite sua matrícula e nome completo para acessar suas informações.</p>

    <input type="text" id="matricula" placeholder="Matrícula">
    <input type="text" id="nome" placeholder="Nome completo">

    <button onclick="buscar()">Buscar meus dados</button>

    <div id="resultado"></div>

    <div class="rodape">
      Desenvolvido por Andréia Moraes
    </div>
  </div>

  <script>
    const API_URL = 'https://muddy-cherry-e89f.profandreiamoraes.workers.dev/';

    async function buscar() {
      const matricula = document.getElementById('matricula').value.trim();
      const nome = document.getElementById('nome').value.trim();
      const resultado = document.getElementById('resultado');

      if (!matricula || !nome) {
        resultado.innerHTML = '<p class="erro">Preencha matrícula e nome completo.</p>';
        return;
      }

      resultado.innerHTML = 'Buscando informações...';

      try {
        const resposta = await fetch(
          API_URL +
          '?matricula=' + encodeURIComponent(matricula) +
          '&nome=' + encodeURIComponent(nome)
        );

        const dados = await resposta.json();

        if (dados.status === 'OK') {
          resultado.innerHTML =
            '<div class="sucesso">' +
            '<p>Dados encontrados.</p>' +
            '<a href="' + dados.link + '" target="_blank">Abrir meu documento</a>' +
            '</div>';
        } else {
          resultado.innerHTML =
            '<p class="erro">Dados não encontrados. Confira matrícula e nome completo.</p>';
        }

      } catch (erro) {
        resultado.innerHTML =
          '<p class="erro">Erro ao buscar informações. Tente novamente.</p>';
      }
    }
  </script>
</body>
</html>
