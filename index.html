<!DOCTYPE html>
<html>
  <head>
    <base target="_top">

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 420px;
        margin: 40px auto;
        background: white;
        padding: 28px;
        border-radius: 16px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        text-align: center;
      }

      h1 {
        font-size: 24px;
        color: #2E7D32;
        margin-bottom: 8px;
      }

      p {
        color: #555;
        font-size: 15px;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        margin-top: 18px;
        padding: 12px;
        background: #2E7D32;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #1B5E20;
      }

      #resultado {
        margin-top: 20px;
        font-size: 15px;
      }

      .sucesso a {
        display: inline-block;
        background: #2E7D32;
        color: white;
        text-decoration: none;
        padding: 12px 18px;
        border-radius: 8px;
        margin-top: 10px;
      }

      .erro {
        color: #B00020;
        font-weight: bold;
      }

      .rodape {
        margin-top: 24px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Acesso do Estudante</h1>

      <p>Digite sua matrícula e seu nome completo para acessar seus dados.</p>

      <input type="text" id="matricula" placeholder="Matrícula">

      <input type="text" id="nome" placeholder="Nome completo">

      <button onclick="buscar()">Buscar meus dados</button>

      <div id="resultado"></div>

      <div class="rodape">
        Sistema de acesso individual por QR Code
      </div>
    </div>

    <script>
      function buscar() {
        const matricula = document.getElementById("matricula").value.trim();
        const nome = document.getElementById("nome").value.trim();
        const resultado = document.getElementById("resultado");

        if (!matricula || !nome) {
          resultado.innerHTML = '<p class="erro">Preencha matrícula e nome completo.</p>';
          return;
        }

        resultado.innerHTML = "Buscando informações...";

        google.script.run
          .withSuccessHandler(function(resposta) {
            if (resposta === "NOT_FOUND" || !resposta) {
              resultado.innerHTML = '<p class="erro">Dados não encontrados. Confira a matrícula e o nome completo.</p>';
            } else {
              resultado.innerHTML =
                '<div class="sucesso">' +
                '<p>Dados encontrados.</p>' +
                '<a href="' + resposta + '" target="_blank">Abrir meu documento</a>' +
                '</div>';
            }
          })
          .withFailureHandler(function(erro) {
            resultado.innerHTML = '<p class="erro">Erro ao buscar os dados. Tente novamente.</p>';
          })
          .buscarAluno(matricula, nome);
      }
    </script>
  </body>
</html>
